name: CI

on:
  push:
    branches:
      - main
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Build
        run: cargo build -p autoagents-server -p autoagents-experts -p autoagents-tool-auth -p autoagents-supervisor
      - name: Test
        run: cargo test -p autoagents-server -p autoagents-experts -p autoagents-tool-auth -p autoagents-supervisor

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt -p autoagents-server -p autoagents-experts -p autoagents-tool-auth -p autoagents-supervisor -- --check
      - name: Clippy
        run: cargo clippy -p autoagents-server -p autoagents-experts -p autoagents-tool-auth -p autoagents-supervisor -- -D warnings

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    needs: [test, lint]   # only worth running if basics pass
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Coverage
        run: |
          cargo tarpaulin \
            --engine llvm \
            --timeout 220 \
            --ignore-panics \
            -p autoagents-server \
            -p autoagents-experts \
            -p autoagents-tool-auth \
            -p autoagents-supervisor \
            --fail-under 60 \
            --out Xml
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          fail_ci_if_error: false    # don't block PRs over coverage drops
          files: ./cobertura.xml
