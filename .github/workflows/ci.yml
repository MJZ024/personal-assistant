name: CI

on:
  push:
    branches:
      - main
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Build
        run: cargo build -p autoagents-server -p autoagents-experts -p autoagents-tool-auth -p autoagents-supervisor
      - name: Test
        run: cargo test -p autoagents-server -p autoagents-experts -p autoagents-tool-auth -p autoagents-supervisor

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt -p autoagents-server -p autoagents-experts -p autoagents-tool-auth -p autoagents-supervisor -- --check
      - name: Clippy
        # `-D warnings` would fail on pre-existing warnings inherited from
        # upstream. We run clippy as an advisory pass and rely on Format + Test
        # for the hard gates.
        run: cargo clippy -p autoagents-server -p autoagents-experts -p autoagents-tool-auth -p autoagents-supervisor
